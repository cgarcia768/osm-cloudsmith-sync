name: Sync OpenSourceMalware to Cloudsmith EPM

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: |
            last_known_packages.json
            osv_overlap_report.json
          key: osm-state-${{ github.run_id }}
          restore-keys: |
            osm-state-

      - name: Run sync script
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          CLOUDSMITH_WORKSPACE: ${{ secrets.CLOUDSMITH_WORKSPACE }}
          CLOUDSMITH_POLICY_SLUG: ${{ secrets.CLOUDSMITH_POLICY_SLUG }}
        run: python sync_osm_to_cloudsmith.py
