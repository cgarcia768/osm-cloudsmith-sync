name: Sync OpenSourceMalware to Cloudsmith EPM

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          CLOUDSMITH_WORKSPACE: ${{ secrets.CLOUDSMITH_WORKSPACE }}
          CLOUDSMITH_POLICY_SLUG: ${{ secrets.CLOUDSMITH_POLICY_SLUG }}
        run: python sync_osm_to_cloudsmith.py

      - name: Commit overlap report and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add osv_overlap_report.json last_known_packages.json
          git diff --cached --quiet || git commit -m "Update OSV overlap report and state [skip ci]"
          git push
